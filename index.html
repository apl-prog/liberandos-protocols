<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>LIBERANDOS · PROTOCOLS</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
  :root{
    --bg:#000000;
    --panel:#0b0b0b;
    --panel-2:#111111;
    --button:#060606;
    --text:#ece8e1;
    --muted:#d7d1c8;
    --soft:#b8afa2;
    --line:rgba(255,255,255,0.10);
    --line-strong:rgba(255,255,255,0.14);
    --max:860px;
  }

  *{ box-sizing:border-box; }

  html{
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    letter-spacing:0.02em;
    font-size:1rem;
  }

  .wrap{
    width:min(calc(100% - 32px), var(--max));
    margin:0 auto;
    padding:28px 0 60px;
  }

  .header{
    border:1px solid var(--line);
    background:var(--panel);
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    border-radius:10px;
  }

  .title{
    margin:0;
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--soft);
  }

  .stamp{
    text-align:right;
    font-size:11px;
    color:var(--muted);
    line-height:1.4;
  }

  .stamp b{
    color:var(--text);
    font-weight:600;
  }

  .grid{
    margin-top:18px;
    border:1px solid var(--line);
    background:var(--panel);
    border-radius:10px;
    overflow:hidden;
  }

  .row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    padding:16px;
    border-top:1px solid var(--line);
    background:var(--panel-2);
    border-radius:0;
  }

  .row:first-child{
    border-top:none;
  }

  .left{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }

  .code{
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--soft);
  }

  .name{
    font-size:14px;
    letter-spacing:0.04em;
    color:var(--text);
  }

  .meta{
    font-size:12px;
    color:var(--muted);
  }

  a.launch{
    text-decoration:none;
    border:1px solid var(--line-strong);
    background:var(--button);
    padding:10px 14px;
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--text);
    flex:0 0 auto;
    border-radius:8px;
  }

  a.launch:hover{
    opacity:0.82;
  }

  .footer{
    margin-top:16px;
    display:flex;
    justify-content:space-between;
    font-size:11px;
    color:var(--muted);
  }

  .muted{
    color:var(--soft);
  }
</style>
  </head>
  <body>
    <main class="wrap">
      <section class="header">
        <div>
          <p class="title">LIBERANDOS · PROTOCOLS</p>
        </div>
        <div class="stamp">
          <div><b>ACCESS</b>: PUBLIC</div>
          <div><b>CHANNEL</b>: protocols.liberandos.com</div>
          <div><b>STATUS</b>: ACTIVE</div>
        </div>
      </section>

      <section class="grid" aria-label="Protocol Index">
        <div class="row">
          <div class="left">
            <div class="code">PR-ORANGE</div>
            <div class="name">PROTOCOL ORANGE</div>
            <div class="meta">Entry vector: peel</div>
          </div>
          <a class="launch" href="./orange/">Enter</a>
        </div>

        <div class="row">
          <div class="left">
            <div class="code">PR-PHASE</div>
            <div class="name">PHASE SHIFT OPERATOR</div>
            <div class="meta">Field device: Generation II</div>
          </div>
          <a class="launch" href="./phase/">Enter</a>
        </div>

        <div class="row">
          <div class="left">
            <div class="code">PR-ASCENSION</div>
            <div class="name">ASCENSION</div>
            <div class="meta">Obstacle course: live</div>
          </div>
          <a class="launch" href="./ascension/">Enter</a>
        </div>
      </section>

      <section class="footer">
        <div><span class="muted">NOTE</span>: do not be distracted</div>
        <div>LOG: <span class="muted">unsealed</span></div>
      </section>
    </main>
  </body>
</html>
