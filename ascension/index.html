<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Liberandos: Crossing Field</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="panel">
      <div class="title">LIBERANDOS: CROSSING FIELD</div>
      <div id="overlayMsg" class="msg">Tap to start</div>
      <button id="startBtn" class="startBtn">START</button>
    </div>
  </div>

  <main class="shell">
    <div class="playfield">
      <canvas id="game" width="512" height="512"></canvas>

      <div class="ui">
        <div id="status">STANDBY</div>
        <div id="integrity">INTEGRITY: 100%</div>
      </div>

      <div class="instruction" id="instruction">
        Move the red Recovery Operator to safety 3 times to Ascend
      </div>
       <div class="instructionSub">
    If you hear nothing, turn Silent Mode off (ringer on)
  </div>
</div

      <div class="ascendPanel hidden" id="ascendPanel">
        <div class="ascendTitle">You have ASCENDED</div>
        <div class="ascendCode">Access code: 93M</div>
        <div class="ascendNote">Press ACCESS to access the training manual</div>
        <a
          class="executeBtn"
          href="https://protocols.liberandos.com/Archive/aps/"
          target="_blank"
          rel="noopener"
        >ACCESS</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="hintRow">
      
    </div>
  </footer>

  <script src="audio.js?v=1"></script>
  <script src="game.js?v=2"></script>
</body>
</html>
