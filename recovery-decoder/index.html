<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Liberandos Fragment Field</title>
  <style>
    :root{
      --bg1:#0c0f14;
      --bg2:#161b22;
      --fg:rgba(255,255,255,0.92);
      --slotSize:112px;
      --fragSize:82px;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.03), transparent 25%),
        radial-gradient(circle at 40% 75%, rgba(255,255,255,0.025), transparent 28%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color:var(--fg);
      font-family: Georgia, "Times New Roman", serif;
      overscroll-behavior:none;
      -webkit-text-size-adjust:100%;
    }

    #loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.65);
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.18), rgba(0,0,0,0.58));
      z-index:100;
      transition:opacity 0.8s ease;
      pointer-events:none;
    }

    #loading.hidden{
      opacity:0;
      pointer-events:none;
    }

    #startGate{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,0.35);
      z-index:110;
      opacity:1;
      transition:opacity 0.5s ease;
    }

    #startGate.hidden{
      opacity:0;
      pointer-events:none;
    }

    #startGateInner{
      padding:14px 18px;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:999px;
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.78);
      font-size:12px;
      letter-spacing:0.14em;
      text-transform:uppercase;
    }

    #field{
      position:relative;
      width:100%;
      height:100%;
      visibility:hidden;
    }

    #field.ready{
      visibility:visible;
    }

    #veil{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at center, transparent 0%, transparent 38%, rgba(0,0,0,0.12) 100%);
      opacity:0.9;
    }

    .slot{
      position:absolute;
      width:var(--slotSize);
      height:var(--slotSize);
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.14);
      background:rgba(255,255,255,0.025);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 24px rgba(255,255,255,0.02);
      transform:translate(-50%, -50%);
      transition:
        box-shadow 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease,
        opacity 0.25s ease;
      opacity:0.9;
      pointer-events:none;
    }

    .slot.near{
      border-color:rgba(255,255,255,0.28);
      background:rgba(255,255,255,0.05);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.06),
        0 0 36px rgba(255,255,255,0.05);
    }

    .slot.solved{
      border-color:rgba(255,255,255,0.36);
      background:rgba(255,255,255,0.08);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 0 48px rgba(255,255,255,0.06);
    }

    .fragment{
      position:absolute;
      width:var(--fragSize);
      height:var(--fragSize);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:10px;
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:none;
      transform:translate(-50%, -50%);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.16), rgba(255,255,255,0.05) 45%, rgba(255,255,255,0.035) 100%);
      border:1px solid rgba(255,255,255,0.16);
      box-shadow:
        0 8px 30px rgba(0,0,0,0.32),
        inset 0 0 18px rgba(255,255,255,0.04);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      font-size:10px;
      letter-spacing:0.08em;
      line-height:1.2;
      color:rgba(255,255,255,0.8);
      transition:
        opacity 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
      z-index:5;
    }

    .fragment:hover{
      border-color:rgba(255,255,255,0.24);
      box-shadow:
        0 10px 34px rgba(0,0,0,0.36),
        inset 0 0 20px rgba(255,255,255,0.06);
    }

    .fragment.dragging{
      cursor:grabbing;
      z-index:30;
      box-shadow:
        0 14px 42px rgba(0,0,0,0.42),
        inset 0 0 20px rgba(255,255,255,0.06);
    }

    .fragment.locked{
      z-index:12;
      border-color:rgba(255,255,255,0.3);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0.07) 45%, rgba(255,255,255,0.04) 100%);
      box-shadow:
        0 10px 38px rgba(0,0,0,0.38),
        inset 0 0 24px rgba(255,255,255,0.07);
    }

    .fragment.proximity{
      border-color:rgba(255,255,255,0.28);
      box-shadow:
        0 10px 36px rgba(0,0,0,0.36),
        0 0 28px rgba(255,255,255,0.04),
        inset 0 0 22px rgba(255,255,255,0.06);
    }

    @keyframes gentleJiggle{
      0%   { transform:translate(-50%, -50%) translate(0px, 0px) rotate(0deg); }
      20%  { transform:translate(-50%, -50%) translate(1px, -1px) rotate(-0.4deg); }
      40%  { transform:translate(-50%, -50%) translate(-1px, 1px) rotate(0.35deg); }
      60%  { transform:translate(-50%, -50%) translate(1px, 0px) rotate(-0.25deg); }
      80%  { transform:translate(-50%, -50%) translate(0px, 1px) rotate(0.2deg); }
      100% { transform:translate(-50%, -50%) translate(0px, 0px) rotate(0deg); }
    }

    .jiggle{
      animation:gentleJiggle 0.65s ease-in-out 2;
    }

    #message{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      min-width:280px;
      max-width:72vw;
      text-align:center;
      font-size:14px;
      line-height:1.6;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.84);
      opacity:0;
      pointer-events:none;
      transition:opacity 1.2s ease;
      z-index:50;
      text-shadow:0 0 22px rgba(255,255,255,0.08);
    }

    #message.revealed{
      opacity:1;
    }

    #hint{
      position:absolute;
      left:24px;
      bottom:20px;
      font-size:10px;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.34);
      pointer-events:none;
      z-index:40;
    }

    @media (max-width: 700px){
      :root{
        --slotSize:92px;
        --fragSize:72px;
      }
      #hint{
        left:16px;
        right:16px;
        bottom:14px;
        font-size:9px;
      }
    }
  </style>
</head>
<body>
  <div id="loading">recovering fragments...</div>
  <div id="startGate" class="hidden">
    <div id="startGateInner">tap to begin</div>
  </div>
  <div id="field"></div>
  <div id="veil"></div>
  <div id="message">fully aligned</div>
  <div id="hint">place the circles where they belong</div>

  <script>
    const STEMS = [
      { file: "atmospherestrings.wav",  label: "field"  },
      { file: "atmospherestrings2.wav", label: "trace"  },
      { file: "elecgtr.wav",            label: "wire"   },
      { file: "gtr.wav",                label: "wood"   },
      { file: "piano.wav",              label: "glass"  },
      { file: "pluckies.wav",           label: "grain"  },
      { file: "stringsmelody.wav",      label: "thread" }
    ];

    const loading = document.getElementById("loading");
    const startGate = document.getElementById("startGate");
    const field = document.getElementById("field");
    const message = document.getElementById("message");

    const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContextCtor();

    let GLOBAL_START = null;
    let audioStarted = false;
    let startingAudioPromise = null;

    const masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(audioCtx.destination);

    const dryBus = audioCtx.createGain();
    dryBus.gain.value = 1.0;
    dryBus.connect(masterGain);

    const convolver = audioCtx.createConvolver();
    convolver.buffer = createImpulseResponse(audioCtx, 2.4, 2.0);

    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.15;

    dryBus.connect(convolver);
    convolver.connect(reverbGain);
    reverbGain.connect(masterGain);

    const state = {
      buffers: new Map(),
      reversedBuffers: new Map(),
      fragments: [],
      slots: [],
      dragged: null,
      draggedPointerId: null,
      offsetX: 0,
      offsetY: 0,
      revealed: false,
      solvedCount: 0,
      masterLoops: new Map(),
      loadingDone: false
    };

    function createImpulseResponse(ctx, seconds, decay){
      const rate = ctx.sampleRate;
      const length = Math.floor(rate * seconds);
      const impulse = ctx.createBuffer(2, length, rate);

      for (let ch = 0; ch < 2; ch++) {
        const data = impulse.getChannelData(ch);
        for (let i = 0; i < length; i++) {
          const n = i / length;
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - n, decay);
        }
      }
      return impulse;
    }

    async function loadAudioBuffers(){
      await Promise.all(
        STEMS.map(async (stem) => {
          const response = await fetch(`audio/${stem.file}`);
          if (!response.ok) {
            throw new Error(`Failed to load ${stem.file}`);
          }
          const arrayBuffer = await response.arrayBuffer();
          const buffer = await audioCtx.decodeAudioData(arrayBuffer.slice(0));
          state.buffers.set(stem.file, buffer);
          state.reversedBuffers.set(stem.file, reverseBuffer(audioCtx, buffer));
        })
      );
    }

    function reverseBuffer(ctx, buffer){
      const reversed = ctx.createBuffer(
        buffer.numberOfChannels,
        buffer.length,
        buffer.sampleRate
      );

      for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
        const src = buffer.getChannelData(ch);
        const dst = reversed.getChannelData(ch);
        for (let i = 0, j = src.length - 1; i < src.length; i++, j--) {
          dst[i] = src[j];
        }
      }
      return reversed;
    }

    function makeDistortionCurve(amount = 25){
      const n = 44100;
      const curve = new Float32Array(n);
      const k = typeof amount === "number" ? amount : 25;
      const deg = Math.PI / 180;

      for (let i = 0; i < n; ++i) {
        const x = i * 2 / n - 1;
        curve[i] = (3 + k) * x * 20 * deg / (Math.PI + k * Math.abs(x));
      }
      return curve;
    }

    function playOneShot(file, options = {}){
      const {
        reversed = false,
        gainValue = 0.45,
        rate = 1,
        withDistortion = false,
        attack = 0.01,
        release = 0.12,
        durationClamp = null
      } = options;

      const buffer = reversed ? state.reversedBuffers.get(file) : state.buffers.get(file);
      if (!buffer || !audioStarted) return null;

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.playbackRate.value = rate;

      const gain = audioCtx.createGain();
      const now = audioCtx.currentTime;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(gainValue, now + attack);

      let tailTime = buffer.duration / Math.max(rate, 0.01);
      if (durationClamp) tailTime = Math.min(tailTime, durationClamp);

      gain.gain.setValueAtTime(gainValue, now + Math.max(0.03, tailTime - release));
      gain.gain.linearRampToValueAtTime(0.0001, now + tailTime);

      source.connect(gain);

      if (withDistortion) {
        const shaper = audioCtx.createWaveShaper();
        const filter = audioCtx.createBiquadFilter();
        shaper.curve = makeDistortionCurve(18);
        shaper.oversample = "4x";
        filter.type = "lowpass";
        filter.frequency.value = 1800;
        gain.connect(shaper);
        shaper.connect(filter);
        filter.connect(dryBus);
      } else {
        gain.connect(dryBus);
      }

      source.start();
      source.stop(now + tailTime + 0.02);

      return source;
    }

    function createLoopVoice(file){
      const buffer = state.buffers.get(file);
      if (!buffer || GLOBAL_START === null) return null;

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      source.loopStart = 0.01;
      source.loopEnd = Math.max(0.02, buffer.duration - 0.01);

      const gain = audioCtx.createGain();
      gain.gain.value = 0.0001;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 3400;
      filter.Q.value = 0.6;

      source.connect(filter);
      filter.connect(gain);
      gain.connect(dryBus);

      source.start(GLOBAL_START);

      return { source, gain, filter };
    }

    function createPersistentStemLoop(file){
      const buffer = state.buffers.get(file);
      if (!buffer || GLOBAL_START === null) return null;

      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.loop = true;
      source.loopStart = 0.01;
      source.loopEnd = Math.max(0.02, buffer.duration - 0.01);

      const gain = audioCtx.createGain();
      gain.gain.value = 0.0001;

      const filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      filter.frequency.value = 4200;
      filter.Q.value = 0.7;

      source.connect(filter);
      filter.connect(gain);
      gain.connect(dryBus);

      source.start(GLOBAL_START);

      return { source, gain, filter };
    }

    function stopLoopVoice(loopVoice){
      if (!loopVoice) return;
      const now = audioCtx.currentTime;
      try {
        loopVoice.gain.gain.cancelScheduledValues(now);
        loopVoice.gain.gain.setValueAtTime(loopVoice.gain.gain.value, now);
        loopVoice.gain.gain.linearRampToValueAtTime(0.0001, now + 0.15);
        loopVoice.source.stop(now + 0.18);
      } catch (e) {}
    }

    async function ensureAudioStarted(){
      if (audioStarted) return;
      if (startingAudioPromise) return startingAudioPromise;

      startingAudioPromise = (async () => {
        await audioCtx.resume();

        GLOBAL_START = audioCtx.currentTime + 0.2;

        for (const stem of STEMS) {
          if (!state.masterLoops.has(stem.file)) {
            const loop = createPersistentStemLoop(stem.file);
            state.masterLoops.set(stem.file, loop);
          }
        }

        audioStarted = true;
      })();

      return startingAudioPromise;
    }

    async function beginExperience(){
      if (!state.loadingDone) return;
      await ensureAudioStarted();
      startGate.classList.add("hidden");
    }

    function getViewportPadding(){
      return window.innerWidth < 700 ? 70 : 95;
    }

    function clamp(n, min, max){
      return Math.min(max, Math.max(min, n));
    }

    function dist(ax, ay, bx, by){
      return Math.hypot(ax - bx, ay - by);
    }

    function getTouchPoint(touch){
      return { x: touch.clientX, y: touch.clientY };
    }

    function layoutSlots(){
      const w = window.innerWidth;
      const h = window.innerHeight;

      const points = [
        [0.18, 0.28],
        [0.40, 0.20],
        [0.67, 0.24],
        [0.82, 0.43],
        [0.68, 0.70],
        [0.39, 0.77],
        [0.17, 0.58]
      ];

      state.slots.forEach((slot, i) => {
        slot.x = points[i][0] * w;
        slot.y = points[i][1] * h;
        slot.el.style.left = `${slot.x}px`;
        slot.el.style.top = `${slot.y}px`;
      });
    }

    function randomStartPosition(existing = []){
      const pad = getViewportPadding();
      let tries = 0;

      while (tries < 200) {
        const x = pad + Math.random() * (window.innerWidth - pad * 2);
        const y = pad + Math.random() * (window.innerHeight - pad * 2);
        const tooClose = existing.some(p => dist(x, y, p.x, p.y) < 120);

        if (!tooClose) return { x, y };
        tries++;
      }

      return {
        x: pad + Math.random() * (window.innerWidth - pad * 2),
        y: pad + Math.random() * (window.innerHeight - pad * 2)
      };
    }

    function buildScene(){
      state.slots = STEMS.map((stem, i) => {
        const el = document.createElement("div");
        el.className = "slot";
        field.appendChild(el);

        return {
          id: i,
          file: stem.file,
          el,
          x: 0,
          y: 0
        };
      });

      layoutSlots();

      const used = [];
      state.fragments = STEMS.map((stem, i) => {
        const el = document.createElement("div");
        el.className = "fragment";
        el.textContent = stem.label;
        field.appendChild(el);

        const pos = randomStartPosition(used);
        used.push(pos);

        el.style.left = `${pos.x}px`;
        el.style.top = `${pos.y}px`;

        const fragment = {
          id: i,
          file: stem.file,
          label: stem.label,
          el,
          x: pos.x,
          y: pos.y,
          slotIndex: i,
          placed: false,
          driftPhase: Math.random() * Math.PI * 2,
          driftSpeed: 0.0005 + Math.random() * 0.00055,
          driftRadius: 8 + Math.random() * 10,
          loopVoice: null
        };

        setupDrag(fragment);
        return fragment;
      });
    }

    function unlockIfBlocked(){
      if (!startGate.classList.contains("hidden")) return true;
      return false;
    }

    function beginDrag(fragment, clientX, clientY){
      state.dragged = fragment;
      fragment.el.classList.add("dragging");

      const rect = fragment.el.getBoundingClientRect();
      state.offsetX = clientX - (rect.left + rect.width / 2);
      state.offsetY = clientY - (rect.top + rect.height / 2);

      if (fragment.placed) {
        fragment.placed = false;
        state.solvedCount = Math.max(0, state.solvedCount - 1);
        fragment.el.classList.remove("locked");
        state.slots[fragment.slotIndex].el.classList.remove("solved");

        const masterLoop = state.masterLoops.get(fragment.file);
        if (masterLoop) {
          const now = audioCtx.currentTime;
          masterLoop.gain.gain.cancelScheduledValues(now);
          masterLoop.gain.gain.setValueAtTime(masterLoop.gain.gain.value, now);
          masterLoop.gain.gain.linearRampToValueAtTime(0.0001, now + 0.2);
        }
      }

      if (!fragment.loopVoice && audioStarted) {
        fragment.loopVoice = createLoopVoice(fragment.file);
      }

      updateProximityVisuals(fragment);
      updateFragmentAudioByDistance(fragment);
    }

    function dragMove(fragment, clientX, clientY){
      const x = clamp(clientX - state.offsetX, 40, window.innerWidth - 40);
      const y = clamp(clientY - state.offsetY, 40, window.innerHeight - 40);

      fragment.x = x;
      fragment.y = y;
      fragment.el.style.left = `${x}px`;
      fragment.el.style.top = `${y}px`;

      updateProximityVisuals(fragment);
      updateFragmentAudioByDistance(fragment);
    }

    function setupDrag(fragment){
      const el = fragment.el;

      el.addEventListener("pointerdown", (e) => {
        if (unlockIfBlocked()) return;
        e.preventDefault();

        state.draggedPointerId = e.pointerId;
        beginDrag(fragment, e.clientX, e.clientY);

        try {
          el.setPointerCapture(e.pointerId);
        } catch (_) {}
      });

      el.addEventListener("pointermove", (e) => {
        if (state.dragged !== fragment) return;
        if (state.draggedPointerId !== null && e.pointerId !== state.draggedPointerId) return;
        dragMove(fragment, e.clientX, e.clientY);
      });

      el.addEventListener("pointerup", (e) => {
        if (state.dragged !== fragment) return;
        if (state.draggedPointerId !== null && e.pointerId !== state.draggedPointerId) return;
        try {
          el.releasePointerCapture(e.pointerId);
        } catch (_) {}
        state.draggedPointerId = null;
        finalizeDrop(fragment);
      });

      el.addEventListener("pointercancel", (e) => {
        if (state.dragged !== fragment) return;
        if (state.draggedPointerId !== null && e.pointerId !== state.draggedPointerId) return;
        state.draggedPointerId = null;
        finalizeDrop(fragment);
      });

      el.addEventListener("touchstart", (e) => {
        if (unlockIfBlocked()) return;
        e.preventDefault();

        const t = e.changedTouches[0];
        const point = getTouchPoint(t);
        beginDrag(fragment, point.x, point.y);
      }, { passive: false });

      el.addEventListener("touchmove", (e) => {
        if (state.dragged !== fragment) return;
        e.preventDefault();

        const t = e.changedTouches[0];
        const point = getTouchPoint(t);
        dragMove(fragment, point.x, point.y);
      }, { passive: false });

      el.addEventListener("touchend", (e) => {
        if (state.dragged !== fragment) return;
        e.preventDefault();
        finalizeDrop(fragment);
      }, { passive: false });

      el.addEventListener("touchcancel", (e) => {
        if (state.dragged !== fragment) return;
        e.preventDefault();
        finalizeDrop(fragment);
      }, { passive: false });
    }

    function updateProximityVisuals(fragment){
      const slot = state.slots[fragment.slotIndex];
      const d = dist(fragment.x, fragment.y, slot.x, slot.y);

      const slotNear = d < 150;
      slot.el.classList.toggle("near", slotNear && !fragment.placed);
      fragment.el.classList.toggle("proximity", d < 180 && !fragment.placed);

      const opacity = clamp(0.52 + (1 - d / 260) * 0.52, 0.5, 1);
      fragment.el.style.opacity = opacity.toFixed(3);
    }

    function updateFragmentAudioByDistance(fragment){
      if (!fragment.loopVoice) return;

      const slot = state.slots[fragment.slotIndex];
      const d = dist(fragment.x, fragment.y, slot.x, slot.y);

      const nearRadius = 260;
      const closeRadius = 60;

      let t = 1 - clamp(d / nearRadius, 0, 1);
      t = Math.pow(t, 1.8);

      const gainTarget = 0.0001 + t * 0.42;
      const freqTarget = 1200 + t * 3400;
      const now = audioCtx.currentTime;

      fragment.loopVoice.gain.gain.cancelScheduledValues(now);
      fragment.loopVoice.gain.gain.linearRampToValueAtTime(gainTarget, now + 0.08);

      fragment.loopVoice.filter.frequency.cancelScheduledValues(now);
      fragment.loopVoice.filter.frequency.linearRampToValueAtTime(freqTarget, now + 0.08);

      if (d < closeRadius) {
        fragment.el.style.opacity = "1";
      }
    }

    function finalizeDrop(fragment){
      state.dragged = null;
      fragment.el.classList.remove("dragging");

      const slot = state.slots[fragment.slotIndex];
      const d = dist(fragment.x, fragment.y, slot.x, slot.y);

      if (d < 54) {
        snapToCorrectSlot(fragment, slot);
      } else {
        wrongPlacement(fragment, slot);
        stopLoopVoice(fragment.loopVoice);
        fragment.loopVoice = null;
      }
    }

    function snapToCorrectSlot(fragment, slot){
      fragment.x = slot.x;
      fragment.y = slot.y;
      fragment.el.style.left = `${slot.x}px`;
      fragment.el.style.top = `${slot.y}px`;
      fragment.placed = true;
      fragment.el.classList.add("locked");
      fragment.el.classList.remove("proximity");
      fragment.el.style.opacity = "1";
      slot.el.classList.remove("near");
      slot.el.classList.add("solved");

      stopLoopVoice(fragment.loopVoice);
      fragment.loopVoice = null;

      const masterLoop = state.masterLoops.get(fragment.file);
      if (masterLoop) {
        const now = audioCtx.currentTime;
        masterLoop.gain.gain.cancelScheduledValues(now);
        masterLoop.gain.gain.setValueAtTime(masterLoop.gain.gain.value, now);
        masterLoop.gain.gain.linearRampToValueAtTime(0.22, now + 0.6);

        masterLoop.filter.frequency.cancelScheduledValues(now);
        masterLoop.filter.frequency.linearRampToValueAtTime(5200, now + 0.6);
      }

      playOneShot(fragment.file, {
        reversed: false,
        gainValue: 0.16,
        rate: 1,
        withDistortion: false,
        attack: 0.01,
        release: 0.10,
        durationClamp: 0.45
      });

      state.solvedCount += 1;

      if (state.solvedCount === STEMS.length && !state.revealed) {
        revealCompletion();
      }
    }

    function wrongPlacement(fragment, correctSlot){
      fragment.el.classList.add("jiggle");
      correctSlot.el.classList.remove("near");
      fragment.el.classList.remove("proximity");

      playOneShot(fragment.file, {
        reversed: true,
        gainValue: 0.18,
        rate: 0.92,
        withDistortion: true,
        attack: 0.02,
        release: 0.18,
        durationClamp: 0.9
      });

      setTimeout(() => {
        const nudgeX = (Math.random() * 26) - 13;
        const nudgeY = (Math.random() * 26) - 13;

        fragment.x = clamp(fragment.x + nudgeX, 42, window.innerWidth - 42);
        fragment.y = clamp(fragment.y + nudgeY, 42, window.innerHeight - 42);

        fragment.el.style.left = `${fragment.x}px`;
        fragment.el.style.top = `${fragment.y}px`;
        fragment.el.classList.remove("jiggle");

        updateProximityVisuals(fragment);
      }, 950);
    }

    function revealCompletion(){
      state.revealed = true;
      message.textContent = "fully aligned";
      message.classList.add("revealed");

      const now = audioCtx.currentTime;

      for (const loop of state.masterLoops.values()) {
        if (!loop) continue;
        loop.gain.gain.cancelScheduledValues(now);
        loop.gain.gain.setValueAtTime(loop.gain.gain.value, now);
        loop.gain.gain.linearRampToValueAtTime(0.26, now + 1.2);

        loop.filter.frequency.cancelScheduledValues(now);
        loop.filter.frequency.linearRampToValueAtTime(6000, now + 1.2);
      }
    }

    function animate(ts){
      for (const fragment of state.fragments) {
        if (state.dragged === fragment) continue;
        if (fragment.placed) continue;

        const driftX = Math.cos(ts * fragment.driftSpeed + fragment.driftPhase) * fragment.driftRadius * 0.018;
        const driftY = Math.sin(ts * fragment.driftSpeed * 0.82 + fragment.driftPhase * 1.2) * fragment.driftRadius * 0.018;

        fragment.x = clamp(fragment.x + driftX, 40, window.innerWidth - 40);
        fragment.y = clamp(fragment.y + driftY, 40, window.innerHeight - 40);

        fragment.el.style.left = `${fragment.x}px`;
        fragment.el.style.top = `${fragment.y}px`;

        updateProximityVisuals(fragment);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      layoutSlots();

      for (const fragment of state.fragments) {
        fragment.x = clamp(fragment.x, 40, window.innerWidth - 40);
        fragment.y = clamp(fragment.y, 40, window.innerHeight - 40);
        fragment.el.style.left = `${fragment.x}px`;
        fragment.el.style.top = `${fragment.y}px`;

        if (fragment.placed) {
          const slot = state.slots[fragment.slotIndex];
          fragment.x = slot.x;
          fragment.y = slot.y;
          fragment.el.style.left = `${slot.x}px`;
          fragment.el.style.top = `${slot.y}px`;
        }
      }
    });

    startGate.addEventListener("pointerdown", async (e) => {
      e.preventDefault();
      await beginExperience();
    });

    startGate.addEventListener("touchstart", async (e) => {
      e.preventDefault();
      await beginExperience();
    }, { passive: false });

    async function init(){
      try {
        buildScene();
        field.classList.add("ready");
        requestAnimationFrame(animate);

        await loadAudioBuffers();

        state.loadingDone = true;
        loading.classList.add("hidden");
        startGate.classList.remove("hidden");
      } catch (err) {
        console.error(err);
        loading.textContent = "audio files not found";
        field.classList.add("ready");
      }
    }

    init();
  </script>
</body>
</html>
